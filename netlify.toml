[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Disable secrets scanning - NEXT_PUBLIC_* vars are intentionally embedded
  # in client bundles, and SMTP vars are in server-side chunks (not exposed)
  SECRETS_SCAN_ENABLED = "false"

# Netlify Next.js plugin handles routing automatically
# API routes and SSR are supported out of the box

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
